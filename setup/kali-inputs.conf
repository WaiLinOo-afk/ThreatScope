# Splunk Universal Forwarder - inputs.conf (Kali Linux VM)
# Location: /opt/splunkforwarder/etc/system/local/inputs.conf
#
# NOTE: Modern Kali uses systemd-journald. Traditional syslog files
# (/var/log/auth.log, /var/log/syslog) do NOT exist.
# Available log sources below.
#
# To write this file:
#   sudo bash -c 'cat > /opt/splunkforwarder/etc/system/local/inputs.conf << EOF ... EOF'

[monitor:///var/log/dpkg.log]
index = syslog
sourcetype = linux_logs

[monitor:///var/log/apache2]
index = syslog
sourcetype = apache_logs

[monitor:///var/log/vmware-network.log]
index = syslog
sourcetype = linux_logs

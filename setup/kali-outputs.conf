# Splunk Universal Forwarder - outputs.conf (Kali Linux VM)
# Location: /opt/splunkforwarder/etc/system/local/outputs.conf
#
# Forwards to Splunk Enterprise on the Windows VM (192.168.56.130).
# PREREQUISITE: Windows Firewall must allow inbound TCP on port 9997:
#   New-NetFirewallRule -DisplayName "Splunk Forwarder" -Direction Inbound -Protocol TCP -LocalPort 9997 -Action Allow
# Verify: nc -zv 192.168.56.130 9997

[tcpout]
defaultGroup = default-autolb-group

[tcpout:default-autolb-group]
server = 192.168.56.130:9997

[tcpout-server://192.168.56.130:9997]

# Splunk Universal Forwarder - inputs.conf (Windows VM)
# Location: C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf
#
# Collects:
#   - Windows Security event log  -> index=wineventlog
#   - Windows System event log    -> index=wineventlog
#   - Sysmon operational log      -> index=sysmon
#
# IMPORTANT: renderXml=true preserves full XML structure for Sysmon events,
# enabling reliable rex field extraction in SPL.
#
# PERMISSION FIX: Sysmon/Operational DACL only allows SY/BA/BO/SO.
# Default SplunkForwarder service account lacks read access.
# Fix: sc.exe config SplunkForwarder obj= "LocalSystem"

[WinEventLog://Security]
disabled = 0
index = wineventlog

[WinEventLog://System]
disabled = 0
index = wineventlog

[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = 0
index = sysmon
renderXml = true
sourcetype = XmlWinEventLog:Microsoft-Windows-Sysmon/Operational

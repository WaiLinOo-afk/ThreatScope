# Splunk Universal Forwarder - outputs.conf (Windows VM)
# Location: C:\Program Files\SplunkUniversalForwarder\etc\system\local\outputs.conf
#
# Forwards to Splunk Enterprise on the same host (loopback).
# Port 9997 must be configured as a receiving port in Splunk:
#   Settings -> Forwarding and Receiving -> Configure Receiving -> New Receiving Port

[tcpout]
defaultGroup = default-autolb-group

[tcpout:default-autolb-group]
server = 127.0.0.1:9997

[tcpout-server://127.0.0.1:9997]
